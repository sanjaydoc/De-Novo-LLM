# Protein / peptide fine-tuning.
#
# Default is ProtGPT2 (~738M) which is a standard HF causal LM and therefore
# works with this pipeline out of the box. On a 6GB GPU it needs 4-bit QLoRA
# (bitsandbytes) -- full fine-tuning does not fit.
#
# NOTE on ESM-3: ESM-3 is a superb protein model but is *not* a plain
# AutoModelForCausalLM -- it ships its own `esm` SDK, is license-gated, and
# needs a dedicated adapter + more VRAM than 6GB. See docs/MODELS.md.
#
#   pip install bitsandbytes
#   denovo prepare  -c configs/protein.yaml -i data/your_proteins.txt
#   denovo train    -c configs/protein.yaml
data:
  modality: protein
  train_file: data/samples/protein_sample.txt
  validation_split: 0.05
  max_length: 256

model:
  pretrained_model: nferruz/ProtGPT2
  load_in_4bit: true          # QLoRA -- required to fit 738M in 6GB
  torch_dtype: float16

lora:
  use_lora: true
  r: 16
  alpha: 32
  dropout: 0.05

train:
  output_dir: outputs/protgpt2_qlora
  epochs: 3
  batch_size: 1
  grad_accum: 16
  lr: 0.0002
  fp16: true
  gradient_checkpointing: true
  logging_steps: 10
  save_steps: 200

generate:
  num_samples: 200
  batch_size: 8
  max_new_tokens: 256
  do_sample: true
  temperature: 1.0
  top_p: 0.9
